name: Sync Transactions Cache

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 09:00 COT (UTC-5)
    - cron: '0 17 * * 1-5'   # 12:00 COT
    - cron: '0 20 * * 1-5'   # 15:00 COT
    - cron: '0 23 * * 1-5'   # 18:00 COT
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke sync-transactions-cache
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://dqfrqjsbfmwtclkclmvc.supabase.co/functions/v1/sync-transactions-cache" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" != "200" ]; then exit 1; fi
